name: Deploy Application

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "lambda/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Terraform deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: lambda/go.sum

      - name: Test Lambda
        working-directory: lambda
        run: go test ./...

      - name: Build Lambda package input
        working-directory: lambda
        run: |
          mkdir -p ../build
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../build/bootstrap .

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.APP_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_huggingface_api_token: ${{ secrets.HUGGINGFACE_API_TOKEN }}
        run: terraform apply -auto-approve

      - name: Print invoke URL
        working-directory: terraform
        run: terraform output invoke_url
